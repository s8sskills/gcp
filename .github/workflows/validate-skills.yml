name: Validate Skills & Security Scan

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-validate:
    name: Check Skill Formatting and Safety
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run Skill Validator
        run: python scripts/validate_skills.py

  secret-scanning:
    name: Scan for Hardcoded Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # The gitleaks-action@v2 wrapper requires a paid GITLEAKS_LICENSE for
      # organization-owned repos. The gitleaks CLI itself is free and
      # unrestricted, so we run the pinned binary directly — same scan, no gate.
      - name: Run Gitleaks Secret Scanner
        run: |
          VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks version
          ./gitleaks dir . --redact --verbose
